# This is a Databricks asset bundle definition for databrick_analytics.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: databrick_analytics
  uuid: b528888b-32f6-440a-a123-21fb94487726

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    presets:
      name_prefix: dev_${workspace.current_user.short_name}_
    default: true
    workspace:
      host: https://dbc-3410a8fa-59bb.cloud.databricks.com
    variables:
      catalog: dev_databricks_analytics
      schema: md
  prod:
    mode: production
    presets:
      name_prefix: pro_
    workspace:
      host: https://dbc-3410a8fa-59bb.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/olajidepaul29@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/olajidepaul29@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: pro_databricks_analytics
      schema: md
    permissions:
      - user_name: olajidepaul29@gmail.com
        level: CAN_MANAGE
